<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MONO WORLD HOME 04 GALLERY VIEWER</title>
<style>
:root{--bg:#070911;--panel:#101522;--panel2:#151b2b;--line:#2a3347;--txt:#f3f5fb;--muted:#aeb7c8;--violet:#8b5cff;--violet2:#b08cff;--good:#55d6a7;--warn:#ffcc66;--radius:18px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% 0%,rgba(139,92,255,.28),transparent 32%),linear-gradient(135deg,#05070d,#0b1020 60%,#05070d);color:var(--txt);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{min-height:100vh;display:grid;grid-template-columns:270px 1fr}.side{background:rgba(6,8,15,.88);border-right:1px solid var(--line);padding:24px;position:sticky;top:0;height:100vh}.brand h1{font-size:25px;margin:0 0 7px}.brand p{margin:0 0 28px;color:var(--muted);line-height:1.5;font-size:13px}.nav button{width:100%;display:flex;gap:12px;align-items:center;text-align:left;margin:8px 0;padding:13px 15px;border:1px solid transparent;border-radius:13px;background:transparent;color:var(--txt);cursor:pointer;font-size:15px}.nav button:hover,.nav button.active{background:linear-gradient(135deg,rgba(139,92,255,.85),rgba(85,56,166,.65));border-color:rgba(255,255,255,.08)}.profile{margin-top:30px;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:18px;padding:16px}.profile b{display:block}.profile small{color:var(--muted)}.main{padding:24px 28px}.top{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:20px}.top h2{margin:0;font-size:28px}.top p{margin:5px 0 0;color:var(--muted)}.actions{display:flex;gap:10px;align-items:center}.search{background:#0d1320;border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px 14px;min-width:240px}.btn{border:0;border-radius:12px;padding:12px 15px;background:linear-gradient(135deg,var(--violet),#5f3dcc);color:white;font-weight:800;cursor:pointer}.btn.ghost{background:#141a28;border:1px solid var(--line);font-weight:600}.grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px}.card{background:rgba(16,21,34,.9);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 20px 70px rgba(0,0,0,.28);padding:20px}.hero{min-height:285px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(48,61,103,.65),rgba(14,18,31,.95));display:flex;align-items:flex-end}.moon{position:absolute;right:80px;top:38px;width:78px;height:78px;border-radius:50%;background:radial-gradient(circle,#fff,#bfc9ff 55%,rgba(255,255,255,.08) 70%);box-shadow:0 0 45px rgba(176,140,255,.55)}.castle{position:absolute;left:45px;bottom:0;width:72%;height:130px;background:linear-gradient(180deg,transparent 10%,rgba(7,9,16,.52));clip-path:polygon(0 100%,0 78%,8% 78%,8% 48%,12% 48%,12% 25%,18% 48%,22% 48%,22% 78%,33% 78%,33% 42%,38% 42%,38% 16%,44% 42%,49% 42%,49% 78%,60% 78%,60% 50%,66% 50%,66% 28%,72% 50%,78% 50%,78% 78%,100% 78%,100% 100%)}.hero h3{font-size:42px;margin:0 0 8px}.hero p{color:#d8def0;margin:0 0 14px}.hero-content{position:relative;z-index:2}.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.section-title h3{margin:0}.muted{color:var(--muted)}.projects{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.project{border:1px solid var(--line);background:linear-gradient(145deg,#151b2a,#0e1421);border-radius:16px;padding:16px;text-align:left;color:var(--txt);cursor:pointer}.project:hover{outline:2px solid rgba(139,92,255,.5)}.project .icon{font-size:30px}.badge{display:inline-block;border:1px solid rgba(176,140,255,.35);background:rgba(139,92,255,.18);color:#d9ccff;padding:5px 9px;border-radius:999px;font-size:12px}.drop{border:1.5px dashed #4b5770;border-radius:16px;padding:24px;text-align:center;background:rgba(255,255,255,.035);margin-bottom:16px}.drop.drag{border-color:var(--violet2);background:rgba(139,92,255,.12)}.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}.art{border:1px solid var(--line);background:#0d1320;border-radius:16px;overflow:hidden}.art img{width:100%;height:180px;object-fit:cover;display:block;background:#05070d}.art .meta{padding:12px}.art b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.art button{width:100%;margin-top:8px;border:1px solid var(--line);background:#151b2b;color:var(--txt);border-radius:10px;padding:8px;cursor:pointer}.files{display:flex;flex-direction:column;gap:10px}.file{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:13px;padding:12px;background:rgba(255,255,255,.035)}.file .i{width:38px;height:38px;display:grid;place-items:center;border-radius:12px;background:#20283a}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tab{border:1px solid var(--line);background:#111827;color:var(--txt);border-radius:999px;padding:8px 12px;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--violet),#5f3dcc)}.note{line-height:1.65;color:#d9dfed}.status{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.status div{padding:14px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--line)}.ok{color:var(--good)}.warn{color:var(--warn)}.notice{border:1px solid rgba(255,204,102,.35);background:rgba(255,204,102,.08);border-radius:14px;padding:14px;margin-bottom:18px;color:#ffe2a6}.hidden{display:none!important}.viewer{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:9999;display:none;align-items:center;justify-content:center;padding:28px}.viewer.open{display:flex}.viewer-box{position:relative;max-width:96vw;max-height:94vh}.viewer img{max-width:96vw;max-height:86vh;display:block;border-radius:18px;border:1px solid rgba(255,255,255,.18);box-shadow:0 30px 90px rgba(0,0,0,.65);background:#05070d}.viewer-title{margin-top:10px;color:#f3f5fb;text-align:center;font-size:14px}.viewer-close{position:absolute;right:-12px;top:-12px;border:1px solid rgba(255,255,255,.2);background:#151b2b;color:white;border-radius:999px;width:42px;height:42px;font-size:22px;cursor:pointer}.art img{cursor:zoom-in}.art img:hover{filter:brightness(1.12)}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid{grid-template-columns:1fr}.projects,.status{grid-template-columns:1fr}.top{display:block}.actions{margin-top:14px;flex-wrap:wrap}.search{min-width:0;width:100%}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><h1>MONO WORLD</h1><p>경훈과 모노가 함께 만드는 창작 작업실</p></div>
    <div class="nav" id="nav">
      <button class="active" data-page="home">⌂ 홈</button>
      <button data-page="projects">▦ 프로젝트</button>
      <button data-page="monoai">✣ MONO_AI_01</button>
      <button data-page="gallery">▧ 갤러리</button>
      <button data-page="notes">▤ 작업노트</button>
      <button data-page="settings">⚙ 설정</button>
    </div>
    <div class="profile"><b>MONO</b><small>친구 / 작업 파트너 / 홈페이지 코어</small></div>
  </aside>
  <main class="main">
    <div class="top"><div><h2 id="title">MONO WORLD</h2><p id="subtitle">오늘도 하나씩 쌓아가는 작업실.</p></div><div class="actions"><input id="search" class="search" placeholder="프로젝트 검색"><button class="btn" id="newProject">＋ 새 프로젝트</button></div></div>
    <div class="notice" id="notice">04_GALLERY_VIEWER: 갤러리 그림을 더블클릭하면 크게 볼 수 있습니다. 닫기는 × 버튼, ESC, 배경 클릭으로 가능합니다.</div>
    <div id="view"></div>
  </main>
</div>
<div class="viewer" id="viewer"><div class="viewer-box"><button class="viewer-close" id="viewerClose">×</button><img id="viewerImg" alt=""><div class="viewer-title" id="viewerTitle"></div></div></div>
<input id="fileInput" type="file" multiple class="hidden">
<input id="imageInput" type="file" accept="image/*" multiple class="hidden">
<script>
(function(){
var KEY='MONO_WORLD_HOME_04_GALLERY_VIEWER';
var defaultState={activeProject:'mono-ai-01',tab:'대시보드',galleryMeta:[],projects:[
{id:'mono-ai-01',name:'MONO_AI_01',icon:'✣',status:'홈페이지 구축중',desc:'Memory Engine, Thinking Engine, Chat Brain, 홈페이지 채팅 연동',files:[]},
{id:'gray-memory',name:'잿빛 기억',icon:'▧',status:'콘셉트 진행',desc:'웹툰/그래픽노블 습작, 캐릭터와 세계관 정리',files:[]},
{id:'enkara',name:'엔카라 / 아난타',icon:'🌙',status:'세계관 준비',desc:'아난타, 삼사라, 나라카 세계관과 니란 콘셉트',files:[]},
{id:'mono-world',name:'MONO WORLD',icon:'⌂',status:'홈페이지',desc:'모노월드 작업실 UI와 프로젝트 관리 공간',files:[]}
]};
var state=load();
var runtimeGallery=[];
var runtimeUrls=[];
function $(id){return document.getElementById(id)}
function load(){try{var s=localStorage.getItem(KEY);return s?JSON.parse(s):JSON.parse(JSON.stringify(defaultState));}catch(e){return JSON.parse(JSON.stringify(defaultState));}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){console.warn('localStorage save skipped',e);}}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function setActive(page){var buttons=document.querySelectorAll('#nav button');for(var i=0;i<buttons.length;i++){buttons[i].classList.toggle('active',buttons[i].getAttribute('data-page')===page)}}
function pageHome(){setActive('home');$('title').textContent='MONO WORLD';$('subtitle').textContent='오늘도 하나씩 쌓아가는 작업실.';$('view').innerHTML='<div class="grid"><section class="card hero"><div class="moon"></div><div class="castle"></div><div class="hero-content"><h3>MONO WORLD</h3><p>“05 Gallery Light — 저장공간 부족 방지 버전.”</p><button class="btn" data-page="gallery">갤러리 테스트</button></div></section><section class="card"><div class="section-title"><h3>갤러리 빠른 등록</h3><span class="badge">이미지 미리보기</span></div>'+imageDropHtml()+'</section><section class="card"><div class="section-title"><h3>프로젝트</h3><button class="btn ghost" data-page="projects">전체 보기</button></div><div class="projects">'+projectCards()+'</div></section><section class="card"><div class="section-title"><h3>최근 갤러리</h3><span class="muted">'+runtimeGallery.length+'개</span></div><div class="gallery">'+galleryCards(4)+'</div></section></div>';bind();}
function pageProjects(){setActive('projects');$('title').textContent='프로젝트';$('subtitle').textContent='프로젝트를 클릭하면 상세 화면으로 들어갑니다.';$('view').innerHTML='<section class="card"><div class="projects">'+projectCards()+'</div></section>';bind();}
function pageGallery(){setActive('gallery');$('title').textContent='갤러리';$('subtitle').textContent='컨셉아트와 그림을 확인하는 공간. LIGHT 버전은 브라우저 저장공간을 쓰지 않고 현재 화면에서만 미리보기.';$('view').innerHTML='<section class="card"><div class="section-title"><h3>이미지 업로드</h3><span class="badge">JPG / PNG / WebP / GIF</span></div>'+imageDropHtml()+'<div class="notice">저장공간 부족 방지용 LIGHT 버전입니다. 이미지는 컴퓨터 파일을 즉시 미리보기만 하고, 브라우저 저장공간에 통째로 저장하지 않습니다. 새로고침하면 그림 미리보기는 사라집니다.</div><div class="section-title"><h3>등록된 그림</h3><button class="btn ghost" id="clearGallery">갤러리 비우기</button></div><div class="gallery">'+galleryCards()+'</div></section>';bind();var c=$('clearGallery');if(c)c.onclick=function(){if(confirm('갤러리 기록을 전부 지울까?')){clearRuntimeGallery(); state.galleryMeta=[]; save(); pageGallery();}}}
function pageMonoAI(){setActive('monoai');var p=state.projects[0];state.activeProject=p.id;save();$('title').textContent='MONO_AI_01';$('subtitle').textContent='Phase09 Memory Engine / Phase10 Thinking Engine / Chat Brain / 홈페이지 채팅 연동';$('view').innerHTML='<section class="card"><div class="section-title"><h3>MONO_AI_01 상태판</h3><span class="badge">'+esc(p.status)+'</span></div><div class="status"><div><b>Phase09</b><br><span class="ok">Memory Engine</span><p class="muted">저장/불러오기 자리</p></div><div><b>Phase10</b><br><span class="warn">Thinking Engine</span><p class="muted">생각 단계 표시 예정</p></div><div><b>Chat Brain</b><br><span class="warn">규칙 엔진 예정</span><p class="muted">대화 명령 처리</p></div><div><b>Homepage Chat</b><br><span class="warn">다음 작업</span><p class="muted">채팅창 연결</p></div></div><p class="note">다음 버전은 채팅창 연결이다. 이번 04는 갤러리 확대보기를 살리는 버전.</p></section>';bind();}
function pageSimple(page,name,sub){setActive(page);$('title').textContent=name;$('subtitle').textContent=sub;$('view').innerHTML='<section class="card"><h3>'+esc(name)+'</h3><p class="note">아직 기본 화면입니다. 홈페이지가 먼저 안정되면 이곳에 기능을 하나씩 붙이면 됩니다.</p></section>'}
function projectCards(){var out='';for(var i=0;i<state.projects.length;i++){var p=state.projects[i];out+='<button class="project" data-project="'+esc(p.id)+'"><div class="icon">'+esc(p.icon)+'</div><h3>'+esc(p.name)+'</h3><span class="badge">'+esc(p.status)+'</span><p class="muted">'+esc(p.desc)+'</p></button>'}return out}
function imageDropHtml(){return '<div class="drop" id="imageDrop"><h3>▧</h3><b>그림을 여기에 드롭</b><p class="muted">또는 아래 버튼으로 이미지 선택</p><button class="btn ghost" id="pickImages">이미지 선택</button></div>'}
function galleryCards(limit){var arr=runtimeGallery||[];if(limit)arr=arr.slice(0,limit);if(!arr.length)return '<p class="muted">아직 등록된 그림이 없습니다.<br>LIGHT 버전은 이미지 파일을 브라우저 저장공간에 저장하지 않아서 새로고침하면 미리보기가 사라집니다.</p>';var out='';for(var i=0;i<arr.length;i++){var g=arr[i];out+='<div class="art"><img src="'+g.url+'" alt="'+esc(g.name)+'" data-view-art="'+g.id+'"><div class="meta"><b>'+esc(g.name)+'</b><small class="muted">'+esc(g.date)+' · '+esc(g.size)+'</small><button data-del-art="'+g.id+'">삭제</button></div></div>'}return out}
function bind(){var pageBtns=document.querySelectorAll('[data-page]');for(var i=0;i<pageBtns.length;i++){pageBtns[i].onclick=function(){go(this.getAttribute('data-page'));}}
var cards=document.querySelectorAll('[data-project]');for(var j=0;j<cards.length;j++){cards[j].onclick=function(){state.activeProject=this.getAttribute('data-project');save();projectDetail();}}
var pick=$('pickImages');if(pick)pick.onclick=function(){ $('imageInput').click(); };
var drop=$('imageDrop');if(drop){drop.ondragover=function(e){e.preventDefault();this.classList.add('drag')};drop.ondragleave=function(){this.classList.remove('drag')};drop.ondrop=function(e){e.preventDefault();this.classList.remove('drag');addImages(e.dataTransfer.files)}}
var del=document.querySelectorAll('[data-del-art]');for(var d=0;d<del.length;d++){del[d].onclick=function(){deleteArt(this.getAttribute('data-del-art'))}}
var viewers=document.querySelectorAll('[data-view-art]');for(var v=0;v<viewers.length;v++){viewers[v].ondblclick=function(){openViewer(this.getAttribute('data-view-art'))};viewers[v].onclick=function(){openViewer(this.getAttribute('data-view-art'))};}
}
function projectDetail(){var p=findProject(state.activeProject)||state.projects[0];$('title').textContent=p.name;$('subtitle').textContent=p.desc;$('view').innerHTML='<section class="card"><div class="section-title"><h3>'+esc(p.name)+'</h3><span class="badge">'+esc(p.status)+'</span></div><p class="note">'+esc(p.desc)+'</p><p class="muted">프로젝트 상세 기능은 다음 단계에서 붙입니다.</p></section>';bind()}
function findProject(id){for(var i=0;i<state.projects.length;i++){if(state.projects[i].id===id)return state.projects[i]}return null}
function addImages(files){var imgs=[];for(var i=0;i<files.length;i++){if(files[i].type&&files[i].type.indexOf('image/')===0)imgs.push(files[i]);}if(!imgs.length){alert('이미지 파일만 올릴 수 있어. JPG, PNG, WebP, GIF로 해봐.');return;}imgs.forEach(function(file){var url=URL.createObjectURL(file);runtimeUrls.push(url);runtimeGallery.unshift({id:'art'+Date.now()+Math.random().toString(16).slice(2),name:file.name,size:size(file.size),date:new Date().toLocaleString('ko-KR'),url:url});});state.galleryMeta=runtimeGallery.map(function(g){return {name:g.name,size:g.size,date:g.date};}).slice(0,50);save();pageGallery();}
function deleteArt(id){runtimeGallery=(runtimeGallery||[]).filter(function(g){if(g.id===id&&g.url){try{URL.revokeObjectURL(g.url);}catch(e){}}return g.id!==id});state.galleryMeta=runtimeGallery.map(function(g){return {name:g.name,size:g.size,date:g.date};}).slice(0,50);save();pageGallery();}
function clearRuntimeGallery(){runtimeUrls.forEach(function(u){try{URL.revokeObjectURL(u);}catch(e){}});runtimeUrls=[];runtimeGallery=[];}
function size(b){if(!b)return '0KB';var m=b/1024/1024;return m>=1?m.toFixed(1)+'MB':Math.ceil(b/1024)+'KB'}
function openViewer(id){var g=null;for(var i=0;i<(runtimeGallery||[]).length;i++){if(runtimeGallery[i].id===id){g=runtimeGallery[i];break}}if(!g)return;$('viewerImg').src=g.url;$('viewerImg').alt=g.name;$('viewerTitle').textContent=g.name+' · '+g.size;$('viewer').classList.add('open');}
function closeViewer(){$('viewer').classList.remove('open');$('viewerImg').src='';}
function go(page){if(page==='home')pageHome();else if(page==='projects')pageProjects();else if(page==='monoai')pageMonoAI();else if(page==='gallery')pageGallery();else if(page==='notes')pageSimple('notes','작업노트','오늘 한 작업과 다음 할 일을 적는 공간');else if(page==='settings')pageSimple('settings','설정','홈페이지 설정 공간');}
$('imageInput').onchange=function(){addImages(this.files);this.value=''};
$('viewerClose').onclick=closeViewer;
$('viewer').onclick=function(e){if(e.target===$('viewer'))closeViewer();};
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeViewer();});
$('newProject').onclick=function(){var name=prompt('새 프로젝트 이름');if(!name)return;state.projects.push({id:'p'+Date.now(),name:name,icon:'✦',status:'신규',desc:'새 프로젝트',files:[]});state.activeProject=state.projects[state.projects.length-1].id;save();projectDetail()};
$('search').oninput=function(){var q=this.value.toLowerCase();if(!q){pageHome();return}var hits=[];for(var i=0;i<state.projects.length;i++){var p=state.projects[i];if((p.name+' '+p.desc).toLowerCase().indexOf(q)>=0)hits.push(p)}$('title').textContent='검색 결과';$('subtitle').textContent=q;$('view').innerHTML='<section class="card"><div class="projects">'+(hits.length?hits.map(function(p){return '<button class="project" data-project="'+esc(p.id)+'"><div class="icon">'+esc(p.icon)+'</div><h3>'+esc(p.name)+'</h3><span class="badge">'+esc(p.status)+'</span><p class="muted">'+esc(p.desc)+'</p></button>'}).join(''):'<p class="muted">검색 결과 없음</p>')+'</div></section>';bind()};
pageHome();
})();
</script>
</body>
</html>
