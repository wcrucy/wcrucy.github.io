<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MONO WORLD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-row">
        <div>
          <h1>MONO WORLD</h1>
          <p>Stories, Art, and Worlds<br/>Created by MONO</p>
        </div>
        <button class="round-btn mobile-toggle" id="closeSidebar" aria-label="메뉴 닫기">‹</button>
      </div>

      <nav class="main-nav" aria-label="주 메뉴">
        <button class="nav-item active" data-route="home"><span>⌂</span>홈</button>
        <div class="project-menu">
          <button class="nav-item nav-title" id="projectToggle"><span>▾</span>프로젝트</button>
          <div class="project-list" id="projectList"></div>
        </div>
        <button class="nav-item" data-route="gallery"><span>▧</span>갤러리</button>
        <button class="nav-item" data-route="music"><span>♫</span>음악</button>
        <button class="nav-item" data-route="notes"><span>▤</span>작업노트</button>
        <button class="nav-item" data-route="settings"><span>⚙</span>설정</button>
        <button class="nav-item" data-route="notice"><span>♧</span>공지사항</button>
        <button class="nav-item" data-route="contact"><span>✉</span>문의하기</button>
      </nav>

      <div class="profile-card">
        <div class="avatar">M</div>
        <div>
          <b>MONO</b>
          <small>Creator</small>
        </div>
        <button class="ghost-wide">내 프로필</button>
      </div>

      <footer class="side-footer">
        <div class="socials"><span>▶</span><span>◎</span><span>✽</span><span>✚</span></div>
        <p>© 2026 MONO WORLD<br/>All rights reserved.</p>
      </footer>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <button class="round-btn menu-btn" id="openSidebar" aria-label="메뉴 열기">☰</button>
        <div class="welcome">
          <h2>어서오세요, MONO님 <span>✣</span></h2>
          <p>오늘도 새로운 이야기를 만들어가요.</p>
        </div>
        <label class="search-box">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="검색..." />
        </label>
        <button class="round-btn">♢</button>
        <button class="primary-btn" id="newProjectBtn">＋ 새 프로젝트 만들기</button>
      </header>

      <section id="view" class="view"></section>
    </main>
  </div>

  <template id="homeTemplate">
    <div class="grid-layout">
      <section class="hero card-glow">
        <div class="moon"></div>
        <div class="castle"></div>
        <div class="hero-content">
          <h3>MONO WORLD</h3>
          <p>“이야기가 있는 곳, 우리가 함께 만드는 세계”</p>
          <button class="primary-btn" data-route="projects">더 알아보기</button>
        </div>
      </section>

      <section class="quick-upload panel">
        <h3>빠른 업로드</h3>
        <div class="dropzone" data-upload="global">
          <div class="upload-icon">☁</div>
          <b>여기에 파일을 드롭하세요</b>
          <button class="primary-btn small" data-pick-file>파일 선택</button>
          <p>jpg, png, webp, psd, zip, pdf, txt, mp3, mp4 지원</p>
        </div>
      </section>

      <section class="works full-left">
        <div class="section-head"><h3>작품 둘러보기</h3><button class="ghost-btn" data-route="gallery">전체 보기 ›</button></div>
        <div class="work-cards" id="workCards"></div>
      </section>

      <section class="updates panel">
        <div class="section-head"><h3>컨셉아트 최근 업데이트</h3><button class="ghost-btn" data-route="gallery">더보기 ›</button></div>
        <div class="thumb-grid" id="conceptGrid"></div>
      </section>

      <section class="project-dashboard full-left" id="projectDashboard"></section>

      <section class="activity panel">
        <div class="section-head"><h3>최근 활동</h3><button class="ghost-btn">더보기 ›</button></div>
        <div class="activity-list" id="activityList"></div>
      </section>

      <section class="shortcut panel">
        <div class="section-head"><h3>바로가기</h3><button class="ghost-btn">›</button></div>
        <div class="shortcut-grid">
          <button data-route="notes">▤<span>작업노트</span></button>
          <button data-route="music">♫<span>음악</span></button>
          <button data-route="gallery">▧<span>갤러리</span></button>
          <button data-route="settings">⚙<span>설정</span></button>
        </div>
      </section>
    </div>
  </template>

  <template id="projectTemplate">
    <section class="project-page panel-wide">
      <div class="project-head">
        <div>
          <h2 id="projectTitle"></h2>
          <p id="projectDesc"></p>
        </div>
        <span class="badge" id="projectStatus"></span>
      </div>
      <div class="tabs" id="projectTabs"></div>
      <div class="tab-view" id="projectTabView"></div>
    </section>
  </template>

  <input id="fileInput" type="file" multiple hidden accept=".jpg,.jpeg,.png,.webp,.psd,.zip,.pdf,.txt,.mp3,.mp4" />
  <script src="script.js"></script>
</body>
</html>
