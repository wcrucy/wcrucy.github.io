<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MONO Sound Studio V01</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">MONO WORLD · GRAY MEMORY</p>
        <h1>Sound Studio V01</h1>
        <p class="subtitle">그림 한 장 + 목소리 + BGM으로 유튜브용 시네마틱을 준비하는 사운드 작업실</p>
      </div>
      <div class="status-card">
        <span class="dot"></span>
        <strong>Local Studio</strong>
        <small>브라우저에서 실행 · 파일은 네 컴퓨터 안에서만 미리듣기</small>
      </div>
    </header>

    <section class="grid two">
      <article class="panel">
        <h2>1. 캐릭터 보이스</h2>
        <label>캐릭터</label>
        <select id="character">
          <option value="아렌">아렌 · 겁 많지만 도망치지 않는 소년</option>
          <option value="아키">아키 · 눈먼 기계공 / 기억 분석가</option>
          <option value="예린">예린 · 무뚝뚝한 명사수</option>
          <option value="카일">카일 · 중년 리더</option>
          <option value="브릭">브릭 · 괴력 탱커</option>
          <option value="로웰">로웰 · 추락한 엘리트</option>
          <option value="베인">베인 · 기억을 먹는 존재</option>
        </select>

        <label>감정</label>
        <select id="emotion">
          <option>평상시</option>
          <option>속삭임</option>
          <option>슬픔</option>
          <option>분노</option>
          <option>절규</option>
          <option>공포</option>
          <option>다짐</option>
        </select>

        <label>대사</label>
        <textarea id="dialogue" rows="8">잠깐... 이 기억은 이상해.
누군가가... 덧씌웠어.
만지지 마. 아직 분석이 끝나지 않았어.</textarea>

        <div class="button-row">
          <button id="makePrompt">보이스 프롬프트 만들기</button>
          <button id="copyPrompt" class="ghost">복사</button>
        </div>

        <label>TTS용 프롬프트</label>
        <textarea id="voicePrompt" rows="8" readonly></textarea>
      </article>

      <article class="panel">
        <h2>2. 오디오 미리듣기</h2>
        <label>목소리 파일 업로드 (mp3/wav/ogg)</label>
        <input id="voiceFile" type="file" accept="audio/*" />
        <audio id="voicePlayer" controls></audio>

        <label>BGM 파일 업로드 (mp3/wav/ogg)</label>
        <input id="bgmFile" type="file" accept="audio/*" />
        <audio id="bgmPlayer" controls loop></audio>

        <div class="mix-controls">
          <div>
            <label>목소리 볼륨 <span id="voiceVolText">100%</span></label>
            <input id="voiceVol" type="range" min="0" max="100" value="100" />
          </div>
          <div>
            <label>BGM 볼륨 <span id="bgmVolText">35%</span></label>
            <input id="bgmVol" type="range" min="0" max="100" value="35" />
          </div>
        </div>

        <div class="button-row">
          <button id="playBoth">동시 재생</button>
          <button id="pauseBoth" class="ghost">정지</button>
        </div>
        <p class="hint">V01은 사운드 구성·대사·프롬프트·프로젝트 저장용이다. 실제 MP3 생성은 외부 TTS에서 만든 뒤 여기서 섞어본다.</p>
      </article>
    </section>

    <section class="grid two">
      <article class="panel">
        <h2>3. Emotion Timeline</h2>
        <div class="timeline-form">
          <input id="timeInput" placeholder="예: 0.5초" />
          <input id="actionInput" placeholder="예: 숨 들이마심 / 루엔!! / 울먹임" />
          <button id="addCue">추가</button>
        </div>
        <ul id="cueList" class="cue-list"></ul>
      </article>

      <article class="panel">
        <h2>4. 프로젝트 저장</h2>
        <label>프로젝트 이름</label>
        <input id="projectName" value="잿빛기억_아키_보이스테스트_01" />
        <div class="button-row">
          <button id="saveProject">JSON 저장</button>
          <button id="loadSample" class="ghost">아렌 샘플</button>
        </div>
        <pre id="projectPreview"></pre>
      </article>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
